<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio 11 Removechild</title>
</head>
<body>
    <div id="contenedor">
        <div id="eleminado">eliminar</div>
    </div>
    <script>
        const elementoEliminar=document.getElementById('eleminado')
        const elementoPadre=elementoEliminar.parentElement;//identifica quien es el padre
        elementoPadre.removeChild(elementoEliminar);
    </script>
</body>
</html>
