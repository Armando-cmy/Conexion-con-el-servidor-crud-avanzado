<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes - Práctica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1> Registro de Alumnos</h1>
            <p>Gestión de datos personales y académicos</p>
            <div class="stats-bar">
                <span class="stat"><strong id="totalAlumnos">0</strong> Alumnos registrados</span>
            </div>
        </header>

        <section class="form-section">
            <div class="form-header">
                <h2>Agregar nuevo alumno</h2>
            </div>
            <form class="inputs-grid" id="formRegistro">
                <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required aria-label="Nombre del estudiante">
                <input type="text" id="curso" name="curso" placeholder="Ej: 1° A, 2° B" required aria-label="Curso del estudiante">
                <input type="number" id="edad" name="edad" placeholder="Edad" required min="1" max="120" aria-label="Edad del estudiante">
                <input type="number" id="hermanos" name="hermanos" placeholder="Nº de hermanos" min="0" max="20" aria-label="Número de hermanos">
                <input type="text" id="ciudad" name="ciudad" placeholder="Ciudad de nacimiento" required aria-label="Ciudad de nacimiento">
                <button type="submit" id="btnAction" class="btn-add">+ Registrar</button>
            </form>
        </section>

        <div class="table-wrapper">
            <table aria-label="Tabla de registro de estudiantes">
                <thead>
                    <tr>
                        <th scope="col">Nombre</th>
                        <th scope="col">Curso</th>
                        <th scope="col">Edad</th>
                        <th scope="col">Hermanos</th>
                        <th scope="col">Ciudad</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaAlumnos">
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
