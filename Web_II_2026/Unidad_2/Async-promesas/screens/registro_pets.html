<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doguito Petshop | Registro Mascota</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/card.css" />
    <link rel="stylesheet" href="../assets/css/componentes/form.css" />
    <link rel="stylesheet" href="../assets/css/componentes/input.css" />
    <link rel="stylesheet" href="../assets/css/componentes/button.css" />
  </head>
  <body>
    <header class="header container">
      <img src="../assets/img/doguitoadm.svg" alt="Logotipo Doguito" class="header__logo" />
      <nav>
        <ul class="header__list-nav">
          <li class="header__link"><a href="#">Dashboard</a></li>
          <li class="header__link"><a href="lista_productos.html">Productos</a></li>
          <li class="header__link"><a href="lista_cliente.html">Clientes</a></li>
          <li class="header__link"><a href="lista_pets.html">Pets</a></li>
        </ul>
      </nav>
    </header>

    <main class="container flex flex--column flex--center">
      <section class="card registro-cliente">
        <h1 class="card__title">Registro de Mascota</h1>
        <form action="#" class="flex flex--column" data-form-pets>
          <div class="input-container">
            <input name="nombre" id="nombre" class="input" type="text" placeholder="Nombre" required data-nombre />
            <label class="input-label" for="nombre">Nombre</label>
          </div>
          <div class="input-container">
            <input name="edad" id="edad" class="input" type="text" placeholder="Edad" required data-edad />
            <label class="input-label" for="edad">Edad</label>
          </div>
          <div class="input-container">
            <input name="raza" id="raza" class="input" type="text" placeholder="Raza" required data-raza />
            <label class="input-label" for="raza">Raza</label>
          </div>
          <div class="input-container">
            <input name="peso" id="peso" class="input" type="text" placeholder="Peso" required data-peso />
            <label class="input-label" for="peso">Peso</label>
          </div>
          <div class="input-container">
            <input name="dueno" id="dueno" class="input" type="text" placeholder="ID del Dueño" required data-dueno />
            <label class="input-label" for="dueno">ID del Dueño</label>
          </div>
          <button type="submit" class="simple-button">Registrar Mascota</button>
        </form>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuidv4.min.js"></script>
    <script src="../controllers/registro_pets_controller.js" type="module"></script>
  </body>
</html>
