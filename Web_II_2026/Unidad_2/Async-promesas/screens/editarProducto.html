<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doguito Petshop | Editar Producto</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base/base.css">
    <link rel="stylesheet" href="../assets/css/componentes/header.css">
    <link rel="stylesheet" href="../assets/css/componentes/card.css">
    <link rel="stylesheet" href="../assets/css/componentes/inputs.css">
    <link rel="stylesheet" href="../assets/css/componentes/button.css">
</head>
<body>
    <header class="header container">
        <img src="../assets/img/doguitoadm.svg" alt="Logotipo Doguito" class="header__logo">
        <nav>
            <ul class="header__list-nav">
                <li class="header__link"><a href="#">Dashboard</a></li>
                <li class="header__link"><a href="./lista_productos.html">Productos</a></li>
                <li class="header__link"><a href="#">Clientes</a></li>
                <li class="header__link"><a href="#">Pets</a></li>
            </ul>
        </nav>
    </header>

    <main class="container flex flex--column flex--center">
        <section class="card product-card">
            <h1 class="product-card__title">Editar Producto</h1>
            <form action="#" class="flex flex--column" data-form>
                <div class="input-container">
                    <input name="nombre" id="nombre" class="input" type="text" placeholder="Nombre del producto" required data-nombre>
                    <label class="input-label" for="nombre">Nombre</label>
                </div>
                <div class="input-container">
                    <input name="precio" id="precio" class="input" type="number" step="0.01" placeholder="Precio" required data-precio>
                    <label class="input-label" for="precio">Precio</label>
                </div>
                <button type="submit" class="simple-button">Actualizar Producto</button>
            </form>
        </section>
    </main>

    <script src="../controllers/actualizar_producto_controller.js" type="module"></script>
</body>
</html>
